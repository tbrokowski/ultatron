# configs/finetune/echocp.yaml
# EchoCP is small (30 patients, 60 clips) — use high LR and more epochs
dataset_root: "/capstor/store/cscs/swissai/a127/ultrasound/raw/cardiac/EchoCP"

model:
  image_backbone: dinov3_l
  video_backbone: vjepa2_l
  frozen_teacher: null
  dtype: bfloat16

finetune:
  lr:           2.0e-4
  weight_decay: 0.01
  max_epochs:   80
  batch_size:   8
  num_workers:  2
  head_type:    mlp
  patience:     15
  monitor:      val_auc
  monitor_mode: max
  freeze_backbone: true
  output_size:  224
  log_every:    5
  checkpoint_best: true
