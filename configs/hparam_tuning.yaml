# Default hyperparameter tuning definitions for submit_hparam_tuning.sh.
#
# Add new variants under `variants` and optionally include them in one or more
# `profiles`. Each variant is a deep override on top of `defaults`.

profiles:
  single:
    - stable_baseline
  sentinel:
    - stable_baseline
    - lr_5e6
    - video_mask_065
    - cross_loss_half
  optimizer:
    - lr_5e6
    - lr_2e5
    - wd_001
    - wd_008
    - clip_05
    - ema_9995
  masking:
    - img_mask_030
    - img_mask_050
    - video_mask_065
    - video_mask_080
    - video_frames_32
  loss:
    - cross_loss_half
    - no_proto
    - nce_025
    - nce_temp_010
    - cross_koleo_005
    - no_cross_koleo
  architecture:
    - align_dim_512
    - proto_128
  trainability:
    - full_backbones
    - last8_layers
    - last4_layers
    - heads_only_phase3
  all:
    - stable_baseline
    - lr_5e6
    - lr_2e5
    - wd_001
    - wd_008
    - clip_05
    - ema_9995
    - img_mask_030
    - img_mask_050
    - video_mask_065
    - video_mask_080
    - video_frames_32
    - cross_loss_half
    - no_proto
    - nce_025
    - nce_temp_010
    - cross_koleo_005
    - no_cross_koleo
    - align_dim_512
    - proto_128
    - full_backbones
    - last8_layers
    - last4_layers
    - heads_only_phase3

defaults:
  seed: 42
  manifest:
    # submit_hparam_tuning.sh passes --manifest explicitly. This path is only
    # the fallback if someone runs scripts/train.py directly from a generated
    # config without --manifest.
    path: "manifests/cardiac_breast_brain_maternal_lung_train.jsonl"
    val_path: null
    # Keep Store paths from the manifest as-is. Do not auto-remap to Scratch.
    root_remap: {}
  curriculum:
    total_training_steps: 8000
    image_samples_per_epoch: 120000
    video_samples_per_epoch: 120000
  loaders:
    image_batch_size: 64
    video_batch_size: 16
    num_workers: 4
    pin_memory: true
  transforms:
    patch_size: 16
    image:
      n_global_crops: 4
      n_local_crops: 8
      max_global_crop_px: 256
      mask_strategy: freq
      freq_mask:
        mask_ratio: 0.40
        n_bands: 1
        use_alp_bias: false
      spatial_mask_ratio: 0.40
    video:
      n_frames: 16
      temporal_stride: 4
      tube_size: 4
      tube_mask_ratio: 0.75
      mask_strategy: freq
      max_crop_px: 112
      spatial_mask_ratio: 0.40
      freq_mask:
        mask_ratio: 0.75
        n_bands: 1
        use_alp_bias: false
  train:
    phase1_frac: 0.15
    phase2_frac: 0.40
    phase3_frac: 1.0
    base_lr: 0.00001
    weight_decay: 0.04
    beta1: 0.9
    beta2: 0.95
    grad_clip: 1.0
    warmup_steps_p1: 500
    warmup_steps_p2: 500
    warmup_steps_p3: 500
    ema_momentum: 0.999
    lam1: 1.0
    lam2: 1.0
    lam3: 0.5
    lam4: 1.0
    lam5: 1.0
    lam6: 1.0
    lam6_nce: 0.5
    lam6_nce_temp: 0.07
    lam7: 0.5
    lam_7b: 0.0
    lam_gram: 0.0
    lam_koleo: 0.1
    lam_koleo_cross: 0.1
    use_koleo: false
    gram_start_step: 999999
    gram_refresh_interval: 50000
    res_step_1: 30000
    res_step_2: 45000
    res_px_1: 256
    res_px_2: 384
    res_px_3: 512
    res_vid_step_1: 30000
    res_vid_step_2: 45000
    res_vid_px_1: 112
    res_vid_px_2: 128
    res_vid_px_3: 160
    checkpoint_every: 1000
    log_every: 25
    force_stage: null
  model:
    image_backbone: dinov3_l
    video_backbone: vjepa2_l
    frozen_teacher: null
    ema_momentum: 0.999
    n_prototypes: 64
    align_dim: 1024
    dtype: bfloat16
    hf_cache_dir: null
    use_gradient_checkpointing: true
    # null = full backbone fine-tuning. 0 = frozen backbone. K > 0 = train
    # only the last K transformer blocks plus final norms.
    trainable_image_layers: 4
    trainable_video_layers: 4
  anatomy_weights:
    cardiac: 0.8
    breast: 1.0
    brain: 1.0
    fetal_head: 1.2
    fetal_abdomen: 1.2
    fetal_planes: 1.2
    fetal_cardiac: 1.2
    intrapartum: 1.2
    lung: 1.3

variants:
  stable_baseline:
    description: "Default 12h confirmation shape: 8k steps, full image crops, 15/25/60 phase split, last-4 backbone unfreezing."
    overrides: {}
  lr_5e6:
    description: "Lower LR to test whether instability is optimizer-driven."
    overrides:
      train:
        base_lr: 0.000005
  lr_2e5:
    description: "Higher LR boundary test; reject if early spikes or skipped steps appear."
    overrides:
      train:
        base_lr: 0.00002
  wd_001:
    description: "Lower weight decay."
    overrides:
      train:
        weight_decay: 0.01
  wd_008:
    description: "Higher weight decay."
    overrides:
      train:
        weight_decay: 0.08
  clip_05:
    description: "Stronger gradient clipping for phase-transition stability."
    overrides:
      train:
        grad_clip: 0.5
  ema_9995:
    description: "Slower EMA teacher update."
    overrides:
      train:
        ema_momentum: 0.9995
      model:
        ema_momentum: 0.9995
  img_mask_030:
    description: "Easier image frequency masking."
    overrides:
      transforms:
        image:
          freq_mask:
            mask_ratio: 0.30
          spatial_mask_ratio: 0.30
  img_mask_050:
    description: "Harder image frequency masking."
    overrides:
      transforms:
        image:
          freq_mask:
            mask_ratio: 0.50
          spatial_mask_ratio: 0.50
  video_mask_065:
    description: "Easier video masking; useful if Phase 2 or Phase 3 video losses spike."
    overrides:
      transforms:
        video:
          tube_mask_ratio: 0.65
          spatial_mask_ratio: 0.35
          freq_mask:
            mask_ratio: 0.65
  video_mask_080:
    description: "Harder video masking boundary test."
    overrides:
      transforms:
        video:
          tube_mask_ratio: 0.80
          spatial_mask_ratio: 0.45
          freq_mask:
            mask_ratio: 0.80
  video_frames_32:
    description: "Longer temporal context; higher memory and harder tube prediction."
    overrides:
      loaders:
        video_batch_size: 16
      transforms:
        video:
          n_frames: 32
          temporal_stride: 8
          tube_size: 8
  cross_loss_half:
    description: "Reduce Phase 3 FILIP/prototype pressure."
    overrides:
      train:
        lam6: 0.5
        lam7: 0.25
  no_proto:
    description: "Disable prototype loss to isolate FILIP coupling."
    overrides:
      train:
        lam7: 0.0
  nce_025:
    description: "Reduce Phase 3 InfoNCE pressure."
    overrides:
      train:
        lam6_nce: 0.25
  nce_temp_010:
    description: "Soften Phase 3 InfoNCE contrastive targets."
    overrides:
      train:
        lam6_nce_temp: 0.10
  cross_koleo_005:
    description: "Reduce cross-branch KoLeo uniformity pressure."
    overrides:
      train:
        lam_koleo_cross: 0.05
  no_cross_koleo:
    description: "Disable cross-branch KoLeo uniformity."
    overrides:
      train:
        lam_koleo_cross: 0.0
  align_dim_512:
    description: "Smaller cross-branch projection space."
    overrides:
      model:
        align_dim: 512
  proto_128:
    description: "More prototypes; only keep if loss_proto remains smooth."
    overrides:
      model:
        n_prototypes: 128
  full_backbones:
    description: "Expensive upper-bound trainability test; fine-tune both full student backbones."
    overrides:
      model:
        trainable_image_layers: null
        trainable_video_layers: null
  last8_layers:
    description: "Freeze early backbone blocks; train only the last 8 image/video transformer blocks."
    overrides:
      model:
        trainable_image_layers: 8
        trainable_video_layers: 8
  last4_layers:
    description: "Explicit default trainability; train only the last 4 image/video transformer blocks."
    overrides:
      model:
        trainable_image_layers: 4
        trainable_video_layers: 4
  heads_only_phase3:
    description: "Freeze both backbones and train only cross-branch/prototype heads in Phase 3."
    overrides:
      train:
        phase1_frac: 0.0
        phase2_frac: 0.0
        force_stage: 3
      model:
        trainable_image_layers: 0
        trainable_video_layers: 0
